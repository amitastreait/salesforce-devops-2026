name: "Salesforce Prod Pipeline"
run-name: "Salesforce Prod Pipeline Run"

on:
  pull_request:
    types:
      - opened
      # - closed
      - synchronize
    paths:
      - 'force-app/**' # 'force-app/*'
    branches:
      - main
      - master
      
permissions:
  contents: read
  pull-requests: write
  actions: read

env:
  ORG_DEFAULT_ALIAS: PROD_ORG
  NODE_VERSION: ">=20.9.0"
  JAVA_VERSION: ">=11"
  SF_CLI_VERSION: latest
  ORG_VARIABLE: ${{ vars.ORGANIZATION_VARIABLE }}

jobs:
  build-salesforce: 
    name: "Build & Validate"
    uses: "./.github/workflows/template.yaml"
    with:
      envionment: production
      runner: macos-latest
    secrets: inherit
    #secrets: 
    #  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}